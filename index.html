<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC4500 Menu Navigator</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Controller</div>
      <div class="controller-pill">
        <span class="controller-dot"></span>SC4500
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Main menu</div>
      <button class="nav-item active" id="nav-devices" onclick="showSection('devices')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
        </span>
        Devices
      </button>
      <button class="nav-item" id="nav-notifications" onclick="showSection('notifications')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5a3.5 3.5 0 00-3.5 3.5v2.5L2 9h10l-1.5-1.5V5A3.5 3.5 0 007 1.5z" stroke="currentColor" stroke-width="1.2"/><path d="M5.5 9v.5a1.5 1.5 0 003 0V9" stroke="currentColor" stroke-width="1.2"/></svg>
        </span>
        Notifications
        <span class="nav-badge">2</span>
      </button>
      <button class="nav-item" id="nav-controller" onclick="showSection('controller')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v3l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </span>
        Controller
      </button>
      <button class="nav-item" id="nav-outputs" onclick="showSection('outputs')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h8m0 0L7 4m3 3l-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M11.5 4v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </span>
        Outputs
      </button>
      <button class="nav-item" id="nav-information" onclick="showSection('information')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 6v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="4" r="0.75" fill="currentColor"/></svg>
        </span>
        Information
      </button>
    </div>
    <div class="instrument-section">
      <div class="nav-label">Connected instruments</div>
      <button class="inst-item active" id="inst-ph" onclick="selectInstrument('ph')">
        <span class="status-dot dot-ok"></span>pH sensor
      </button>
      <button class="inst-item" onclick="alert('Add an instrument via the Devices menu.')">
        <span class="status-dot" style="background: var(--color-border-secondary);"></span>
        <span style="color: var(--color-text-tertiary); font-size: 12px;">+ Add instrument</span>
      </button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="bc-item current">Devices</span>
      </div>
      <div class="search-box">
        <span style="color:var(--color-text-tertiary);font-size:13px;">⌕</span>
        <input type="text" id="search-input" placeholder="Search menus..." oninput="doSearch(this.value)" />
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
