<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC4500 Menu Navigator</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="app-title">Menu Navigator</div>
      <div class="sidebar-title">Controller</div>
      <select id="controller-select" class="controller-select" onchange="switchController(this.value)">
        <option value="sc4500">SC4500</option>
        <option value="sc200">SC200</option>
      </select>
    </div>
    <div class="nav-section">
      <div class="nav-label">Main menu</div>
      <div id="main-nav-container"></div>
    </div>
    <div class="instrument-section">
      <div class="nav-label">Connected instruments</div>
      <div id="instrument-list"></div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="bc-item current">Devices</span>
      </div>
      <div class="search-box">
        <span style="color:var(--color-text-tertiary);font-size:13px;">⌕</span>
        <input type="text" id="search-input" placeholder="Search menus..." oninput="doSearch(this.value)" />
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="js/data/controllers.js"></script>
<script src="js/data/devices.js"></script>
<script src="js/data/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
