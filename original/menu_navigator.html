<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC4500 Menu Navigator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f4;
  --color-background-tertiary: #ebebea;
  --color-background-info: #e6f1fb;
  --color-background-danger: #fcebeb;
  --color-background-warning: #faeeda;
  --color-background-success: #eaf3de;
  --color-text-primary: #1a1a18;
  --color-text-secondary: #5f5e5a;
  --color-text-tertiary: #888780;
  --color-text-info: #185fa5;
  --color-text-danger: #a32d2d;
  --color-text-warning: #854f0b;
  --color-text-success: #3b6d11;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --color-border-primary: rgba(0,0,0,0.32);
  --color-border-info: #378add;
  --color-border-danger: #e24b4a;
  --color-border-warning: #ba7517;
  --font-sans: system-ui, -apple-system, sans-serif;
  --font-mono: ui-monospace, monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1e1e1c;
    --color-background-secondary: #2a2a28;
    --color-background-tertiary: #323230;
    --color-background-info: #0c2e52;
    --color-background-danger: #3d1010;
    --color-background-warning: #3d2504;
    --color-background-success: #172a08;
    --color-text-primary: #f0ede8;
    --color-text-secondary: #b4b2a9;
    --color-text-tertiary: #888780;
    --color-text-info: #85b7eb;
    --color-text-danger: #f09595;
    --color-text-warning: #fac775;
    --color-text-success: #c0dd97;
    --color-border-tertiary: rgba(255,255,255,0.1);
    --color-border-secondary: rgba(255,255,255,0.18);
    --color-border-primary: rgba(255,255,255,0.28);
    --color-border-info: #378add;
    --color-border-danger: #e24b4a;
    --color-border-warning: #ba7517;
  }
}
body { font-family: var(--font-sans); background: var(--color-background-tertiary); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; }
.app { display: flex; height: 580px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); width: 100%; max-width: 860px; }
.sidebar { width: 220px; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; background: var(--color-background-secondary); flex-shrink: 0; }
.sidebar-header { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.sidebar-title { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
.controller-pill { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; padding: 4px 10px 4px 8px; background: var(--color-background-info); border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--color-text-info); cursor: default; border: none; }
.controller-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.nav-section { padding: 10px 8px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.nav-label { font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); padding: 0 8px 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; color: var(--color-text-primary); border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--color-background-tertiary); }
.nav-item.active { background: var(--color-background-primary); color: var(--color-text-info); font-weight: 500; border: 0.5px solid var(--color-border-tertiary); }
.nav-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-badge { margin-left: auto; font-size: 10px; padding: 1px 6px; border-radius: 20px; background: var(--color-background-warning); color: var(--color-text-warning); font-weight: 500; }
.instrument-section { padding: 10px 8px 6px; flex: 1; overflow-y: auto; }
.inst-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; color: var(--color-text-secondary); border: none; background: none; width: 100%; text-align: left; }
.inst-item:hover { background: var(--color-background-tertiary); color: var(--color-text-primary); }
.inst-item.active { color: var(--color-text-info); background: var(--color-background-primary); font-weight: 500; border: 0.5px solid var(--color-border-tertiary); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: #4caf50; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar { padding: 0 20px; height: 48px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 0; }
.breadcrumb { display: flex; align-items: center; gap: 0; font-size: 13px; flex: 1; min-width: 0; overflow: hidden; }
.bc-item { color: var(--color-text-secondary); white-space: nowrap; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
.bc-item:hover { color: var(--color-text-primary); background: var(--color-background-secondary); }
.bc-item.current { color: var(--color-text-primary); font-weight: 500; cursor: default; }
.bc-item.current:hover { background: none; }
.bc-sep { color: var(--color-text-tertiary); padding: 0 2px; font-size: 11px; }
.search-box { display: flex; align-items: center; gap: 8px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 5px 10px; }
.search-box input { border: none; background: none; font-size: 13px; color: var(--color-text-primary); outline: none; width: 140px; }
.content { flex: 1; overflow-y: auto; padding: 16px 20px; }
.page-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.page-desc { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 16px; line-height: 1.5; }
.menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 20px; }
.menu-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; cursor: pointer; transition: border-color 0.1s; }
.menu-card:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
.menu-card-icon { width: 28px; height: 28px; border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-size: 14px; }
.menu-card-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
.menu-card-sub { font-size: 12px; color: var(--color-text-secondary); line-height: 1.4; }
.menu-card-arrow { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; }
.detail-section { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 16px; margin-bottom: 12px; }
.detail-section-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.setting-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.setting-row:last-child { border-bottom: none; }
.setting-name { font-size: 13px; color: var(--color-text-primary); flex: 1; }
.setting-value { font-size: 13px; color: var(--color-text-secondary); }
.setting-path { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; font-family: var(--font-mono); }
.tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-right: 4px; }
.tag-required { background: var(--color-background-danger); color: var(--color-text-danger); }
.tag-optional { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); }
.note-box { background: var(--color-background-info); border-left: 2px solid var(--color-border-info); border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; padding: 8px 12px; font-size: 12px; color: var(--color-text-info); margin-bottom: 12px; line-height: 1.5; }
.warn-box { background: var(--color-background-warning); border-left: 2px solid var(--color-border-warning); border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; padding: 8px 12px; font-size: 12px; color: var(--color-text-warning); margin-bottom: 12px; line-height: 1.5; }
.danger-box { background: var(--color-background-danger); border-left: 2px solid var(--color-border-danger); border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; padding: 8px 12px; font-size: 12px; color: var(--color-text-danger); margin-bottom: 12px; line-height: 1.5; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; padding: 4px 8px; border-radius: var(--border-radius-md); border: none; background: none; margin-bottom: 12px; }
.back-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.sr-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-bottom: 8px; cursor: pointer; background: var(--color-background-primary); }
.sr-item:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
.sr-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.sr-path { font-size: 11px; color: var(--color-text-tertiary); font-family: var(--font-mono); margin-top: 2px; }
.sr-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--color-text-secondary); font-size: 13px; }
button { font-family: var(--font-sans); cursor: pointer; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Controller</div>
      <div class="controller-pill">
        <span class="controller-dot"></span>SC4500
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Main menu</div>
      <button class="nav-item active" id="nav-devices" onclick="showSection('devices')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
        </span>
        Devices
      </button>
      <button class="nav-item" id="nav-notifications" onclick="showSection('notifications')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5a3.5 3.5 0 00-3.5 3.5v2.5L2 9h10l-1.5-1.5V5A3.5 3.5 0 007 1.5z" stroke="currentColor" stroke-width="1.2"/><path d="M5.5 9v.5a1.5 1.5 0 003 0V9" stroke="currentColor" stroke-width="1.2"/></svg>
        </span>
        Notifications
        <span class="nav-badge">2</span>
      </button>
      <button class="nav-item" id="nav-controller" onclick="showSection('controller')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v3l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </span>
        Controller
      </button>
      <button class="nav-item" id="nav-outputs" onclick="showSection('outputs')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h8m0 0L7 4m3 3l-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M11.5 4v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </span>
        Outputs
      </button>
      <button class="nav-item" id="nav-information" onclick="showSection('information')">
        <span class="nav-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 6v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="4" r="0.75" fill="currentColor"/></svg>
        </span>
        Information
      </button>
    </div>
    <div class="instrument-section">
      <div class="nav-label">Connected instruments</div>
      <button class="inst-item active" id="inst-ph" onclick="selectInstrument('ph')">
        <span class="status-dot dot-ok"></span>pH sensor
      </button>
      <button class="inst-item" onclick="alert('Add an instrument via the Devices menu.')">
        <span class="status-dot" style="background: var(--color-border-secondary);"></span>
        <span style="color: var(--color-text-tertiary); font-size: 12px;">+ Add instrument</span>
      </button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="bc-item current">Devices</span>
      </div>
      <div class="search-box">
        <span style="color:var(--color-text-tertiary);font-size:13px;">⌕</span>
        <input type="text" id="search-input" placeholder="Search menus..." oninput="doSearch(this.value)" />
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>

let stack = ['devices'];

function setNavActive(sectionId) {
  ['nav-devices','nav-notifications','nav-controller','nav-outputs','nav-information'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  const map = { devices:'nav-devices', notifications:'nav-notifications', controller:'nav-controller', outputs:'nav-outputs', information:'nav-information' };
  if (map[sectionId]) { const el = document.getElementById(map[sectionId]); if (el) el.classList.add('active'); }
}

function showSection(id) {
  document.getElementById('search-input').value = '';
  stack = [id];
  render();
  setNavActive(id);
}

function navigate(id) {
  document.getElementById('search-input').value = '';
  stack.push(id);
  render();
}

function goBack() {
  if (stack.length > 1) stack.pop();
  render();
}

function goTo(idx) {
  stack = stack.slice(0, idx + 1);
  render();
}

function render() {
  const currentId = stack[stack.length - 1];
  const node = DATA[currentId];
  if (!node) return;

  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = stack.map((id, i) => {
    const n = DATA[id];
    if (!n) return '';
    const label = (n.title || id).split(' — ')[0];
    if (i === stack.length - 1) return `<span class="bc-item current">${label}</span>`;
    return `<span class="bc-item" onclick="goTo(${i})">${label}</span><span class="bc-sep">›</span>`;
  }).join('');

  const content = document.getElementById('content');
  let html = '';

  if (stack.length > 1) html += `<button class="back-btn" onclick="goBack()">‹ Back</button>`;

  if (node.type === 'readings') {
    html += `<div class="page-title">${node.title}</div>`;
    html += `<div class="page-desc" style="margin-top:4px;">Live sensor values (simulated for demo)</div>`;
    html += `<div class="detail-section" style="margin-top:12px;"><div class="detail-section-title">Current measurements</div>`;
    const readings = [
      { label:'pH', value:'7.24', unit:'pH', color:'#e6f1fb', tc:'#0C447C' },
      { label:'ORP', value:'+185', unit:'mV', color:'#e1f5ee', tc:'#085041' },
      { label:'Temperature', value:'23.1', unit:'°C', color:'#faeeda', tc:'#633806' }
    ];
    html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;">`;
    readings.forEach(r => {
      html += `<div style="background:${r.color};border-radius:var(--border-radius-md);padding:12px;">
        <div style="font-size:11px;font-weight:500;color:${r.tc};opacity:0.7;margin-bottom:4px;">${r.label}</div>
        <div style="font-size:22px;font-weight:500;color:${r.tc};">${r.value}</div>
        <div style="font-size:11px;color:${r.tc};opacity:0.7;">${r.unit}</div>
      </div>`;
    });
    html += `</div>`;
    html += `<div class="setting-row"><span class="setting-name">Sensor status</span><span class="setting-value" style="color:#4caf50;">● OK</span></div>`;
    html += `<div class="setting-row"><span class="setting-name">Last calibration</span><span class="setting-value">2025-03-12 09:41</span></div>`;
    html += `<div class="setting-row"><span class="setting-name">Signal source</span><span class="setting-value">Channel 1 (digital SC)</span></div>`;
    html += `</div>`;
    content.innerHTML = html;
    return;
  }

  html += `<div class="page-title">${node.title}</div>`;
  if (node.desc) html += `<div class="page-desc">${node.desc}</div>`;
  if (node.danger) html += `<div class="danger-box">${node.danger}</div>`;
  if (node.warn) html += `<div class="warn-box">${node.warn}</div>`;
  if (node.note) html += `<div class="note-box">${node.note}</div>`;

  if (node.children) {
    html += `<div class="menu-grid">`;
    node.children.forEach(c => {
      html += `<div class="menu-card" onclick="navigate('${c.id}')">
        <div class="menu-card-icon" style="background:${c.color||'var(--color-background-secondary)'};">
          <span style="font-size:13px;color:var(--color-text-primary);">${c.icon}</span>
        </div>
        <div class="menu-card-title">${c.label}</div>
        <div class="menu-card-sub">${c.sub}</div>
        <div class="menu-card-arrow">Open →</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (node.type === 'detail' && node.settings) {
    html += `<div class="detail-section"><div class="detail-section-title">Settings &amp; options</div>`;
    node.settings.forEach(s => {
      html += `<div class="setting-row">
        <div style="flex:1;">
          <div class="setting-name">${s.name} <span class="tag tag-${s.tag}">${s.tag}</span></div>
          <div class="setting-value" style="font-size:12px;margin-top:1px;">${s.value}</div>
          <div class="setting-path">Path: ${s.path}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  content.innerHTML = html;
}

function doSearch(q) {
  if (!q || q.trim().length < 2) { render(); return; }
  const lower = q.toLowerCase();
  const results = [];
  function walk(id, parentTitle) {
    const node = DATA[id];
    if (!node) return;
    const fullTitle = node.title || id;
    if (fullTitle.toLowerCase().includes(lower)) results.push({ id, title: fullTitle, path: parentTitle, desc: node.desc || '' });
    if (node.settings) {
      node.settings.forEach(s => {
        if (s.name.toLowerCase().includes(lower) || s.value.toLowerCase().includes(lower))
          results.push({ id, title: s.name, path: s.path, desc: s.value, jump: id });
      });
    }
    if (node.children) node.children.forEach(c => walk(c.id, fullTitle));
  }
  ['devices','notifications','controller','outputs','information'].forEach(root => walk(root, ''));

  document.getElementById('breadcrumb').innerHTML = `<span class="bc-item current">Search: "${q}"</span>`;
  const content = document.getElementById('content');
  if (results.length === 0) { content.innerHTML = `<div class="empty-state">No results found for "${q}"</div>`; return; }
  let html = `<div class="page-title" style="margin-bottom:12px;">Results for "${q}" <span style="font-size:13px;font-weight:400;color:var(--color-text-secondary);">${results.length} found</span></div>`;
  results.slice(0, 20).forEach(r => {
    html += `<div class="sr-item" onclick="navigateTo('${r.jump||r.id}')">
      <div style="flex:1;min-width:0;">
        <div class="sr-name">${r.title}</div>
        <div class="sr-path">${r.path}</div>
        ${r.desc ? `<div class="sr-desc">${r.desc.substring(0,80)}${r.desc.length>80?'...':''}</div>` : ''}
      </div>
      <span style="color:var(--color-text-tertiary);font-size:13px;">›</span>
    </div>`;
  });
  content.innerHTML = html;
}

function navigateTo(id) {
  document.getElementById('search-input').value = '';
  const pathMap = {
    'ph-overview': ['devices','ph-overview'],
    'ph-readings': ['devices','ph-overview','ph-readings'],
    'ph-device-menu': ['devices','ph-overview','ph-device-menu'],
    'ph-calibration': ['devices','ph-overview','ph-device-menu','ph-calibration'],
    'ph-settings': ['devices','ph-overview','ph-device-menu','ph-settings'],
    'ph-diagnostics': ['devices','ph-overview','ph-device-menu','ph-diagnostics'],
    'ph-maintenance': ['devices','ph-overview','ph-maintenance'],
    'ph-historical': ['devices','ph-overview','ph-historical']
  };
  stack = pathMap[id] || [id.split('-')[0] || 'devices', id];
  render();
  setNavActive(stack[0]);
}

function selectInstrument(id) {
  document.querySelectorAll('.inst-item').forEach(el => el.classList.remove('active'));
  document.getElementById('inst-ph')?.classList.add('active');
  stack = ['devices','ph-overview'];
  render();
  setNavActive('devices');
}

render();
</script>
</body>
</html>
